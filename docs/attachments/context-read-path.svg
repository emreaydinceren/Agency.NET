  <text x="480" y="238" text-anchor="middle" fill="#9d8bd6" font-size="10">pure · read-only · :17</text>
  <text x="480" y="256" text-anchor="middle" fill="#9d8bd6" font-size="10">reads the whole blackboard</text>

