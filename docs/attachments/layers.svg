<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 960 560" xmlns="http://www.w3.org/2000/svg" width="960" height="560"
     font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#a78bfa"/>
    </marker>
  </defs>

  <!-- backdrop -->
  <rect x="0" y="0" width="960" height="560" rx="16" fill="#1b1530"/>

  <!-- title -->
  <text x="480" y="42" text-anchor="middle" fill="#e9e4ff" font-size="24" font-weight="600" letter-spacing="2">Agency — Solution Layers</text>
  <text x="480" y="62" text-anchor="middle" fill="#9d8bd6" font-size="12" letter-spacing="1">src/Agency.slnx  ·  lower layers know nothing about higher ones</text>

  <!-- ══════════════════════════════════════════
       Row 1 — Foundation
       ══════════════════════════════════════════ -->
  <rect x="340" y="78" width="280" height="56" rx="12" fill="#241d3d" stroke="#a78bfa" stroke-width="1.8"/>
  <text x="480" y="103" text-anchor="middle" fill="#e9e4ff" font-size="14" font-weight="600">Agency.Common</text>
  <text x="480" y="122" text-anchor="middle" fill="#9d8bd6" font-size="11" font-family="monospace">Dataset · shared data shape · no deps</text>

  <!-- Bus 1 : Common → Providers -->
  <line x1="480" y1="134" x2="480" y2="150" stroke="#a78bfa" stroke-width="1.5"/>
  <line x1="160" y1="150" x2="800" y2="150" stroke="#a78bfa" stroke-width="1.5"/>
  <line x1="160" y1="150" x2="160" y2="164" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="320" y1="150" x2="320" y2="164" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="480" y1="150" x2="480" y2="164" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="640" y1="150" x2="640" y2="164" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="800" y1="150" x2="800" y2="164" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ══════════════════════════════════════════
       Row 2 — Providers  (5 boxes, w=150, gap=10, margin=85)
       ══════════════════════════════════════════ -->

  <!-- Embeddings -->
  <rect x="85" y="166" width="150" height="54" rx="10" fill="#241d3d" stroke="#5cc8ff" stroke-width="1.6"/>
  <text x="160" y="192" text-anchor="middle" fill="#e9e4ff" font-size="13" font-weight="600">Embeddings</text>
  <text x="160" y="210" text-anchor="middle" fill="#8fb6d6" font-size="10" font-family="monospace">IEmbeddingGenerator</text>

  <!-- Sql -->
  <rect x="245" y="166" width="150" height="54" rx="10" fill="#241d3d" stroke="#5cc8ff" stroke-width="1.6"/>
  <text x="320" y="192" text-anchor="middle" fill="#e9e4ff" font-size="13" font-weight="600">Sql</text>
  <text x="320" y="210" text-anchor="middle" fill="#8fb6d6" font-size="10" font-family="monospace">Postgres · Sqlite</text>

  <!-- VectorStore -->
  <rect x="405" y="166" width="150" height="54" rx="10" fill="#241d3d" stroke="#5cc8ff" stroke-width="1.6"/>
  <text x="480" y="192" text-anchor="middle" fill="#e9e4ff" font-size="13" font-weight="600">VectorStore</text>
  <text x="480" y="210" text-anchor="middle" fill="#8fb6d6" font-size="10" font-family="monospace">IVectorStore</text>

  <!-- KeyValueStore -->
  <rect x="565" y="166" width="150" height="54" rx="10" fill="#241d3d" stroke="#5cc8ff" stroke-width="1.6"/>
  <text x="640" y="192" text-anchor="middle" fill="#e9e4ff" font-size="13" font-weight="600">KeyValueStore</text>
  <text x="640" y="210" text-anchor="middle" fill="#8fb6d6" font-size="10" font-family="monospace">IKVStore</text>

  <!-- Llm -->
  <rect x="725" y="166" width="150" height="54" rx="10" fill="#241d3d" stroke="#ffb454" stroke-width="1.6"/>
  <text x="800" y="192" text-anchor="middle" fill="#e9e4ff" font-size="13" font-weight="600">Llm</text>
  <text x="800" y="210" text-anchor="middle" fill="#e0b985" font-size="10" font-family="monospace">IModelProvider</text>

  <!-- Bus 2 : Providers → Services -->
  <line x1="160" y1="220" x2="160" y2="238" stroke="#a78bfa" stroke-width="1.5"/>
  <line x1="320" y1="220" x2="320" y2="238" stroke="#a78bfa" stroke-width="1.5"/>
  <line x1="480" y1="220" x2="480" y2="238" stroke="#a78bfa" stroke-width="1.5"/>
  <line x1="640" y1="220" x2="640" y2="238" stroke="#a78bfa" stroke-width="1.5"/>
  <line x1="800" y1="220" x2="800" y2="238" stroke="#a78bfa" stroke-width="1.5"/>
  <line x1="160" y1="238" x2="800" y2="238" stroke="#a78bfa" stroke-width="1.5"/>
  <line x1="220" y1="238" x2="220" y2="254" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="480" y1="238" x2="480" y2="254" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="740" y1="238" x2="740" y2="254" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ══════════════════════════════════════════
       Row 3 — Services  (3 boxes, w=200, gap=60, margin=120)
       ══════════════════════════════════════════ -->

  <!-- Ingestion -->
  <rect x="120" y="256" width="200" height="60" rx="10" fill="#241d3d" stroke="#6ee7a8" stroke-width="1.6"/>
  <text x="220" y="282" text-anchor="middle" fill="#e9e4ff" font-size="13" font-weight="600">Ingestion</text>
  <text x="220" y="300" text-anchor="middle" fill="#9be3bd" font-size="10" font-family="monospace">FileSystem · SemanticKernel</text>

  <!-- Memory -->
  <rect x="380" y="256" width="200" height="60" rx="10" fill="#241d3d" stroke="#6ee7a8" stroke-width="1.6"/>
  <text x="480" y="282" text-anchor="middle" fill="#e9e4ff" font-size="13" font-weight="600">Memory</text>
  <text x="480" y="300" text-anchor="middle" fill="#9be3bd" font-size="10" font-family="monospace">Retrieval · Distiller · Hygiene</text>

  <!-- MCP -->
  <rect x="640" y="256" width="200" height="60" rx="10" fill="#241d3d" stroke="#6ee7a8" stroke-width="1.6"/>
  <text x="740" y="282" text-anchor="middle" fill="#e9e4ff" font-size="13" font-weight="600">MCP</text>
  <text x="740" y="300" text-anchor="middle" fill="#9be3bd" font-size="10" font-family="monospace">Mcp.Memory</text>

  <!-- Bus 3 : Services → Harness -->
  <line x1="220" y1="316" x2="220" y2="336" stroke="#a78bfa" stroke-width="1.5"/>
  <line x1="480" y1="316" x2="480" y2="336" stroke="#a78bfa" stroke-width="1.5"/>
  <line x1="740" y1="316" x2="740" y2="336" stroke="#a78bfa" stroke-width="1.5"/>
  <line x1="220" y1="336" x2="740" y2="336" stroke="#a78bfa" stroke-width="1.5"/>
  <line x1="480" y1="336" x2="480" y2="354" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ══════════════════════════════════════════
       Row 4 — Harness
       ══════════════════════════════════════════ -->
  <rect x="310" y="356" width="340" height="74" rx="12" fill="#241d3d" stroke="#a78bfa" stroke-width="2"/>
  <text x="480" y="382" text-anchor="middle" fill="#c9bdf2" font-size="14" font-weight="600">Agency.Harness</text>
  <text x="480" y="400" text-anchor="middle" fill="#9d8bd6" font-size="11" font-family="monospace">Agent.cs · Tools/ · Skills/ · Permissions/</text>
  <text x="480" y="418" text-anchor="middle" fill="#9d8bd6" font-size="11" font-family="monospace">AgentHooks · StopConditions · Loop/LoopRunner</text>

  <!-- Harness → Console -->
  <line x1="480" y1="430" x2="480" y2="450" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ══════════════════════════════════════════
       Row 5 — Host
       ══════════════════════════════════════════ -->
  <rect x="355" y="452" width="250" height="56" rx="12" fill="#241d3d" stroke="#5cc8ff" stroke-width="1.6"/>
  <text x="480" y="478" text-anchor="middle" fill="#e9e4ff" font-size="13" font-weight="600">Harness.Console</text>
  <text x="480" y="497" text-anchor="middle" fill="#8fb6d6" font-size="11" font-family="monospace">reference host</text>
</svg>
