name: .NET 10 CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: dotnet-10

    env:
      LlmTest__Claude__ApiKey: ${{ secrets.LlmTest_Claude_ApiKey }}
      LlmTest__OpenAI__ApiKey: ${{ secrets.LlmTest_OpenAI_ApiKey }}
      ConnectionStrings__PostgreSql: ${{ secrets.ConnectionStrings_PostgreSql }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Restore dependencies
        working-directory: src
        run: dotnet restore

      - name: Build Solution
        working-directory: src
        run: dotnet build --configuration Release --no-restore

      - name: Run Tests
        working-directory: src
        run: dotnet test --configuration Release --no-build --verbosity normal