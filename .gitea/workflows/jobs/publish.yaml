name: Publish NuGet Packages

on:
  workflow_call:
    inputs:
      build-number:
        required: false
        type: string
        default: ''
    secrets:
      NUGET_PUBLISH_TOKEN:
        required: true

jobs:
  publish:
    runs-on: dotnet-10

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🧰 Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: 🔎 Read package revision
        id: version
        run: |
          REVISION=$(grep '<Revision>' src/Directory.Build.props | grep -o '[0-9]*')
          echo "revision=$REVISION" >> $GITHUB_OUTPUT

      - name: 📋 Generate third-party notices
        if: steps.version.outputs.revision == '0'
        working-directory: src
        run: |
          dotnet tool install --global thirdlicense || dotnet tool update --global thirdlicense
          export PATH="$HOME/.dotnet/tools:$PATH"
          dotnet sln Agency.slnx list | grep '\.csproj$' | grep -v 'Test' | while read proj; do
            thirdlicense --project "$proj" --output "$(dirname $proj)/THIRD-PARTY-NOTICES.TXT"
          done

      - name: 📦 Pack NuGet packages
        if: steps.version.outputs.revision == '0'
        working-directory: src
        run: |
          PACK_ARGS=""
          if [ -n "${{ inputs.build-number }}" ]; then
            PACK_ARGS="/p:BuildNumber=${{ inputs.build-number }}"
          fi
          dotnet pack --configuration Release $PACK_ARGS --output ./nupkg

      - name: 🚀 Publish NuGet packages
        if: steps.version.outputs.revision == '0'
        working-directory: src
        run: |
          for pkg in nupkg/*.nupkg; do
            dotnet nuget push "$pkg" \
              --source http://gitea-host.example:3000/api/packages/emre/nuget/index.json \
              --api-key ${{ secrets.NUGET_PUBLISH_TOKEN }} \
              --skip-duplicate \
              --config-file ./NuGet.Config
          done
