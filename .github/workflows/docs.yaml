name: Docs (GitHub Pages)

# Builds the DocFX site (conceptual docs/*.md + API reference generated from XML doc
# comments — see RT8) and publishes it to GitHub Pages via Pages-from-Actions.
#
# One-time manual setup this workflow cannot perform on its own: on GitHub, under
# Settings → Pages, set Source to "GitHub Actions" for this repository.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'src/**/*.csproj'
      - 'src/**/*.cs'
      - 'docfx.json'
      - 'toc.yml'
      - 'index.md'
      - 'api/index.md'
      - '.github/workflows/docs.yaml'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: 🛠️ Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'

      - name: 📦 Restore dependencies
        working-directory: src
        # src/NuGet.Config also lists baget-local/gitea-local, pointing at a self-hosted feed
        # unreachable from a GitHub-hosted runner. --ignore-failed-sources does not suppress
        # NU1801 there (it's treated as Warning-As-Error and retries indefinitely), so instead
        # force restore to use only nuget.org — every package here resolves from it, and it
        # already has its own packageSourceMapping entry in NuGet.Config.
        run: dotnet restore --source https://api.nuget.org/v3/index.json

      - name: 📚 Install DocFX
        run: dotnet tool install --global docfx

      - name: 🏗️ Build documentation site
        run: docfx docfx.json

      - name: ⚙️ Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: 📤 Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
