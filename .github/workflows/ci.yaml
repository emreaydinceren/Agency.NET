name: CI (GitHub)

# Runs a subset of the Gitea CI suite on GitHub-hosted runners: unit tests plus the
# functional tests that only need PostgreSQL. GitHub-hosted runners have no route to
# the self-hosted HTTP cache proxy or LM Studio (see Agents/CIPipeline.md), so any
# functional test with a hard LLM dependency is excluded via `Category!=RequiresLlm`.
# Tests that only *optionally* touch an LLM (i.e. they probe reachability and call
# Assert.Skip when it's absent — see Agency.Memory.Functional.Test) are NOT excluded;
# they run for real against Postgres and self-skip their LLM-gated portions.

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/dotnet/sdk:10.0

    services:
      postgres:
        image: pgvector/pgvector:pg18-trixie
        env:
          POSTGRES_USER: dev_user
          POSTGRES_PASSWORD: dev_password
          POSTGRES_DB: dev_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # The job runs inside a container on the same Docker network as the `postgres`
      # service, so it's reachable by service name — NOT `localhost`.
      ConnectionStrings__PostgreSql: Host=postgres;Port=5432;Username=dev_user;Password=dev_password;Database=dev_db

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Restore dependencies
        working-directory: src
        # src/NuGet.Config also lists baget-local/gitea-local, pointing at a self-hosted feed
        # unreachable from a GitHub-hosted runner. Every package here resolves from nuget.org,
        # so downgrade unreachable-source failures to warnings instead of failing restore.
        run: dotnet restore --ignore-failed-sources

      - name: 🛠️ Build Solution
        working-directory: src
        run: dotnet build --configuration Release --no-restore

      # Proves the console boots end-to-end (DI, schema init, and MCP servers degrading
      # gracefully when Docker is absent in the runner) and exits 0, without needing a
      # live LLM or interactive input. Run the built binary from its OUTPUT directory:
      # shared-appsettings.json is a linked file that only sits next to appsettings.json in
      # the build output, and the host resolves config relative to its working directory.
      - name: 💨 Console boot smoke test
        working-directory: src/Harness/Agency.Harness.Console/bin/Release/net10.0
        env:
          AGENCY_SMOKE_EXIT: '1'
        run: dotnet Agency.Harness.Console.dll

      - name: 🧪 Run Unit Tests
        working-directory: src
        run: dotnet test --configuration Release --no-build --verbosity normal --filter "Category!=Functional" --collect:"XPlat Code Coverage" --results-directory ./coverage

      - name: 🧪 Run Postgres-only Functional Tests
        working-directory: src
        run: dotnet test --configuration Release --no-build --verbosity normal --filter "Category=Functional&Category!=Cloud&Category!=RequiresLlm" --collect:"XPlat Code Coverage" --results-directory ./coverage

      # ReportGenerator is a plain dotnet global tool (no Node.js), so this same step also
      # runs unmodified in Gitea CI's Node-less dotnet-sdk container (see ci-pr.yaml/ci-main.yaml)
      # — printing to the log guarantees visibility even where GITHUB_STEP_SUMMARY isn't rendered.
      - name: 📊 Coverage summary
        working-directory: src
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool
          export PATH="$HOME/.dotnet/tools:$PATH"
          reportgenerator -reports:"coverage/**/coverage.cobertura.xml" -targetdir:coverage-report -reporttypes:"TextSummary;MarkdownSummaryGithub"
          cat coverage-report/Summary.txt
          if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then cat coverage-report/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"; fi

      # Public-CI-only: this is what visitors/hiring managers see as the README badge (RT44).
      # GitHub-hosted runners have Node.js preinstalled, unlike Gitea's dotnet-sdk container —
      # see the reflection in Agents/CIPipeline.md on why actions/checkout had to be dropped
      # there for the same reason. codecov-action stays GitHub-only for that reason.
      - name: ☂️ Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: src/coverage/**/coverage.cobertura.xml
          flags: unit,postgres-functional
          fail_ci_if_error: false
