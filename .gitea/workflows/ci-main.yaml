name: CI (Main)

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - 'docs/**'

jobs:
  secret-scan:
    runs-on: dotnet-10
    container:
      image: mcr.microsoft.com/dotnet/sdk:10.0
    defaults:
      run:
        shell: bash

    steps:
      - name: 📥 Checkout
        env:
          GIT_TOKEN: ${{ github.token }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          AUTH_URL="${GITHUB_SERVER_URL/http:\/\//http:\/\/x-access-token:$GIT_TOKEN@}"
          BRANCH="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          git clone --branch "$BRANCH" "$AUTH_URL/$GITHUB_REPOSITORY.git" "$GITHUB_WORKSPACE"
          git -C "$GITHUB_WORKSPACE" -c advice.detachedHead=false checkout "$GITHUB_SHA"

      - name: 🔐 Install gitleaks
        run: |
          set -euo pipefail
          case "$(uname -m)" in
            x86_64) ARCH=x64 ;;
            aarch64|arm64) ARCH=arm64 ;;
            *) echo "Unsupported arch: $(uname -m)"; exit 1 ;;
          esac
          VER=$(curl -sSLf https://api.github.com/repos/gitleaks/gitleaks/releases/latest \
                | grep -oE '"tag_name": *"v[^"]+"' | head -1 | sed -E 's/.*"v?([^"]+)".*/\1/')
          echo "Installing gitleaks $VER (linux_$ARCH)"
          curl -sSLf "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_${ARCH}.tar.gz" -o /tmp/gitleaks.tgz
          tar -xzf /tmp/gitleaks.tgz -C /usr/local/bin gitleaks
          gitleaks version

      - name: 🔎 Scan working tree for secrets
        run: |
          gitleaks dir . \
            --config .gitleaks.toml \
            --redact \
            --no-banner \
            --verbose

  build-and-publish:
    runs-on: dotnet-10
    container:
      image: mcr.microsoft.com/dotnet/sdk:10.0
    defaults:
      run:
        shell: bash

    env:
      LlmTest__Claude__ApiKey: ${{ secrets.LlmTest__Claude__ApiKey }}
      LlmTest__OpenAI__ApiKey: ${{ secrets.LlmTest__OpenAI__ApiKey }}
      ConnectionStrings__PostgreSql: ${{ secrets.ConnectionStrings__PostgreSql }}

    steps:
      - name: 📥 Checkout
        env:
          GIT_TOKEN: ${{ github.token }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          AUTH_URL="${GITHUB_SERVER_URL/http:\/\//http:\/\/x-access-token:$GIT_TOKEN@}"
          BRANCH="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          git clone --branch "$BRANCH" "$AUTH_URL/$GITHUB_REPOSITORY.git" "$GITHUB_WORKSPACE"
          git -C "$GITHUB_WORKSPACE" -c advice.detachedHead=false checkout "$GITHUB_SHA"

      - name: 🔖 Assert tag matches computed version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          dotnet tool install --global nbgv
          export PATH="$HOME/.dotnet/tools:$PATH"
          COMPUTED_VERSION=$(nbgv get-version -v NuGetPackageVersion)
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$COMPUTED_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match NBGV's computed version $COMPUTED_VERSION — always create release tags with 'nbgv tag', never by hand."
            exit 1
          fi
          echo "Tag v$TAG_VERSION matches computed version $COMPUTED_VERSION"

      - name: 📦 Restore dependencies
        working-directory: src
        run: dotnet restore

      - name: 🔒 Check for vulnerable dependencies
        working-directory: src
        run: |
          dotnet list package --vulnerable --include-transitive 2>&1 | tee vuln-scan.log
          if grep -q "has the following vulnerable packages" vuln-scan.log; then
            echo "::error::Vulnerable dependency detected — see log above. Bump the version in Directory.Packages.props (see the SQLitePCLRaw entry for a transitive-pin example)."
            exit 1
          fi

      - name: 🛠️ Build Solution
        working-directory: src
        run: dotnet build --configuration Release --no-restore

      - name: 🧪 Run Unit Tests
        working-directory: src
        run: |
          for i in 1 2 3; do
            if dotnet test --configuration Release --no-build --verbosity normal --filter "Category!=Functional"; then
              break
            fi
            [ $i -eq 3 ] && exit 1 || echo "Attempt $i failed, retrying..."
          done

      - name: 🧪 Run Functional Tests
        working-directory: src
        run: |
          for i in 1 2 3; do
            if dotnet test --configuration Release --no-build --verbosity normal --filter "Category=Functional&Category!=Cloud" -- RunConfiguration.MaxCpuCount=1; then
              break
            fi
            [ $i -eq 3 ] && exit 1 || echo "Attempt $i failed, retrying..."
          done

      - name: 📋 Generate third-party notices
        working-directory: src
        run: |
          # Agency packages embed localhost:3000 as repository URL; forward to actual Gitea host
          # so thirdlicense can fetch license data (patching plain-text files doesn't help because
          # thirdlicense reads the URL from inside the .nupkg zip archive).
          apt-get update -qq && apt-get install -y -q socat
          socat TCP-LISTEN:3000,fork,reuseaddr TCP:gitea-host.example:3000 &
          SOCAT_PID=$!
          dotnet tool install --global thirdlicense || dotnet tool update --global thirdlicense
          export PATH="$HOME/.dotnet/tools:$PATH"
          dotnet sln Agency.slnx list | grep '\.csproj$' | grep -v 'Test' | while read proj; do
            thirdlicense --project "$proj" --output "$(dirname $proj)/THIRD-PARTY-NOTICES.TXT"
          done
          kill $SOCAT_PID 2>/dev/null || true

      - name: 📦 Pack NuGet packages
        working-directory: src
        run: dotnet pack --configuration Release --no-build --output ./nupkg

      - name: 🚀 Publish NuGet packages
        working-directory: src
        run: |
          for pkg in nupkg/*.nupkg; do
            [ -f "$pkg" ] || continue
            curl --fail -X PUT \
              -H "Authorization: token ${{ secrets.NUGETPUBLISHTOKEN }}" \
              -F "package=@$pkg" \
              "http://gitea-host.example:3000/api/packages/emre/nuget"
          done
          for pkg in nupkg/*.snupkg; do
            [ -f "$pkg" ] || continue
            curl --fail -X PUT \
              -H "Authorization: token ${{ secrets.NUGETPUBLISHTOKEN }}" \
              -F "package=@$pkg" \
              "http://gitea-host.example:3000/api/packages/emre/nuget/symbolpackage"
          done

      - name: 🔍 Inspect & test-install published packages
        working-directory: src
        run: |
          set -euo pipefail
          apt-get update -qq && apt-get install -y -q unzip

          # src/NuGet.Config already defines "gitea-local" pointing at this same feed URL;
          # `dotnet nuget add source` rejects a second source with a duplicate URL, so update
          # the existing source with credentials instead of adding a new one.
          dotnet nuget update source gitea-local \
            --username emre \
            --password "${{ secrets.NUGETPUBLISHTOKEN }}" \
            --store-password-in-clear-text

          fail=0
          for pkg in nupkg/*.nupkg; do
            [ -f "$pkg" ] || continue
            nuspec=$(unzip -p "$pkg" '*.nuspec')
            id=$(echo "$nuspec" | grep -oP '(?<=<id>)[^<]+')
            version=$(echo "$nuspec" | grep -oP '(?<=<version>)[^<]+')
            echo "== $id $version =="

            listing=$(unzip -l "$pkg")
            for required in "lib/net10.0/${id}.dll" "lib/net10.0/${id}.xml" "README.md" "LICENSE" "NOTICE" "Agency_128.png"; do
              if ! echo "$listing" | grep -qF "$required"; then
                echo "::error::$pkg missing required entry: $required"
                fail=1
              fi
            done
            if echo "$listing" | grep -qi '\.pdb$'; then
              echo "::error::$pkg contains a stray .pdb (symbols must ship in the .snupkg only)"
              fail=1
            fi
            if echo "$listing" | grep -qi '\.cs$'; then
              echo "::error::$pkg contains loose .cs source (sources should be embedded, not shipped as files)"
              fail=1
            fi

            work=$(mktemp -d)
            cp -r PackageSmokeTest "$work/harness"
            if ! dotnet add "$work/harness/Agency.PackageSmokeTest.csproj" package "$id" --version "$version" --source gitea-local; then
              echo "::error::$id $version failed to restore from the Gitea feed"
              fail=1
            elif ! dotnet run --project "$work/harness/Agency.PackageSmokeTest.csproj" -- "$id"; then
              echo "::error::$id $version installed but failed to load"
              fail=1
            fi
            rm -rf "$work"
          done

          exit $fail
