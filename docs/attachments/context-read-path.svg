  <rect x="650" y="96" width="296" height="38" rx="8" fill="#241d3d" stroke="#6ee7a8" stroke-width="1.2"/>
  <text x="798" y="111" text-anchor="middle" fill="#e9e4ff" font-size="11" font-weight="600">## Facts</text>
