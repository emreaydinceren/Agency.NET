name: CI (Pull Request)

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'

jobs:
  secret-scan:
    runs-on: dotnet-10
    container:
      image: mcr.microsoft.com/dotnet/sdk:10.0
    defaults:
      run:
        shell: bash

    steps:
      - name: 📥 Checkout
        env:
          GIT_TOKEN: ${{ github.token }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          AUTH_URL="${GITHUB_SERVER_URL/http:\/\//http:\/\/x-access-token:$GIT_TOKEN@}"
          BRANCH="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          git clone --branch "$BRANCH" "$AUTH_URL/$GITHUB_REPOSITORY.git" "$GITHUB_WORKSPACE"
          git -C "$GITHUB_WORKSPACE" -c advice.detachedHead=false checkout "$GITHUB_SHA"

      - name: 🔐 Install gitleaks
        run: |
          set -euo pipefail
          case "$(uname -m)" in
            x86_64) ARCH=x64 ;;
            aarch64|arm64) ARCH=arm64 ;;
            *) echo "Unsupported arch: $(uname -m)"; exit 1 ;;
          esac
          VER=$(curl -sSLf https://api.github.com/repos/gitleaks/gitleaks/releases/latest \
                | grep -oE '"tag_name": *"v[^"]+"' | head -1 | sed -E 's/.*"v?([^"]+)".*/\1/')
          echo "Installing gitleaks $VER (linux_$ARCH)"
          curl -sSLf "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_${ARCH}.tar.gz" -o /tmp/gitleaks.tgz
          tar -xzf /tmp/gitleaks.tgz -C /usr/local/bin gitleaks
          gitleaks version

      - name: 🔎 Scan working tree for secrets
        run: |
          gitleaks dir . \
            --config .gitleaks.toml \
            --redact \
            --no-banner \
            --verbose

  validate:
    runs-on: dotnet-10
    container:
      image: mcr.microsoft.com/dotnet/sdk:10.0
    defaults:
      run:
        shell: bash

    services:
      postgres:
        image: pgvector/pgvector:pg18-trixie
        env:
          POSTGRES_USER: dev_user
          POSTGRES_PASSWORD: dev_password
          POSTGRES_DB: dev_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      LlmTest__Claude__ApiKey: ${{ secrets.LlmTest__Claude__ApiKey }}
      LlmTest__OpenAI__ApiKey: ${{ secrets.LlmTest__OpenAI__ApiKey }}
      # The job runs inside a container on the same Docker network as the `postgres`
      # service, so it's reachable by service name — NOT `localhost`.
      ConnectionStrings__PostgreSql: Host=postgres;Port=5432;Username=dev_user;Password=dev_password;Database=dev_db

    steps:
      - name: 📥 Checkout
        env:
          GIT_TOKEN: ${{ github.token }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          AUTH_URL="${GITHUB_SERVER_URL/http:\/\//http:\/\/x-access-token:$GIT_TOKEN@}"
          BRANCH="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          git clone --branch "$BRANCH" "$AUTH_URL/$GITHUB_REPOSITORY.git" "$GITHUB_WORKSPACE"
          git -C "$GITHUB_WORKSPACE" -c advice.detachedHead=false checkout "$GITHUB_SHA"

      - name: 📦 Restore dependencies
        working-directory: src
        run: dotnet restore

      - name: 🔒 Check for vulnerable dependencies
        working-directory: src
        run: |
          dotnet list package --vulnerable --include-transitive 2>&1 | tee vuln-scan.log
          if grep -q "has the following vulnerable packages" vuln-scan.log; then
            echo "::error::Vulnerable dependency detected — see log above. Bump the version in Directory.Packages.props (see the SQLitePCLRaw entry for a transitive-pin example)."
            exit 1
          fi

      - name: 🛠️ Build Solution
        working-directory: src
        run: dotnet build --configuration Release --no-restore

      - name: 🧪 Run Unit Tests
        working-directory: src
        run: |
          for i in 1 2 3; do
            if dotnet test --configuration Release --no-build --verbosity normal --filter "Category!=Functional" --collect:"XPlat Code Coverage" --results-directory ./coverage; then
              break
            fi
            [ $i -eq 3 ] && exit 1 || echo "Attempt $i failed, retrying..."
          done

      - name: 🧪 Run Functional Tests
        working-directory: src
        run: |
          for i in 1 2 3; do
            if dotnet test --configuration Release --no-build --verbosity normal --filter "Category=Functional&Category!=Cloud" --collect:"XPlat Code Coverage" --results-directory ./coverage -- RunConfiguration.MaxCpuCount=1; then
              break
            fi
            [ $i -eq 3 ] && exit 1 || echo "Attempt $i failed, retrying..."
          done

      # Mirrors the GitHub CI coverage step (RT44) so a coverlet/package/filter regression
      # surfaces here first, before the code syncs to the public GitHub mirror. No Codecov
      # upload here: codecov-action is a Node.js action and this container (mcr.microsoft.com/
      # dotnet/sdk:10.0) has no Node — see Agents/CIPipeline.md's actions/checkout reflection.
      # Runs after both test steps so the Postgres-backed Functional suite's coverage (e.g.
      # Agency.Memory.Sql.Postgres.Test) merges into the same report instead of being dropped.
      - name: 📊 Coverage summary
        working-directory: src
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool
          export PATH="$HOME/.dotnet/tools:$PATH"
          reportgenerator -reports:"coverage/**/coverage.cobertura.xml" -targetdir:coverage-report -reporttypes:"TextSummary;MarkdownSummaryGithub"
          cat coverage-report/Summary.txt
          if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then cat coverage-report/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"; fi

