<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 960 860" xmlns="http://www.w3.org/2000/svg" width="960" height="860"
     font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#a78bfa"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="960" height="860" rx="16" fill="#1b1530"/>
  <text x="480" y="40" text-anchor="middle" fill="#e9e4ff" font-size="24" font-weight="600" letter-spacing="2">The Whole Story in One Trace</text>
  <text x="480" y="58" text-anchor="middle" fill="#9d8bd6" font-size="12" letter-spacing="1">permission model · ReadFile allowed · WriteFile pended · user grants · loop resumes</text>

  <!-- boxes: x=80 w=800 h=52 gap=12 (slot=64) center=480 -->

  <!-- A1 LLM emits batch -->
  <rect x="80" y="72" width="800" height="52" rx="12" fill="#241d3d" stroke="#ffb454" stroke-width="1.8"/>
  <text x="480" y="93" text-anchor="middle" fill="#e9e4ff" font-size="12" font-weight="600">LLM emits tool-call batch</text>
  <text x="480" y="111" text-anchor="middle" fill="#e0b985" font-size="10.5">ReadFile(README)  ·  WriteFile(E:/app/config.json)  ·  in parallel — Agent.cs:668</text>
  <line x1="480" y1="126" x2="480" y2="134" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- A2 per-call gate -->
  <rect x="80" y="136" width="800" height="52" rx="12" fill="#241d3d" stroke="#a78bfa" stroke-width="1.8"/>
  <text x="480" y="157" text-anchor="middle" fill="#e9e4ff" font-size="12" font-weight="600">per-call gate runs in parallel — Agent.cs:689</text>
  <text x="480" y="175" text-anchor="middle" fill="#9d8bd6" font-size="10.5">OnPreToolUse hooks → PermissionEvaluator: pure decision, never blocks, never I/O</text>
  <line x1="480" y1="190" x2="480" y2="198" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- A3 ReadFile allow -->
  <rect x="80" y="200" width="800" height="52" rx="12" fill="#241d3d" stroke="#6ee7a8" stroke-width="1.8"/>
  <text x="480" y="221" text-anchor="middle" fill="#e9e4ff" font-size="12" font-weight="600">ReadFile → Allow</text>
  <text x="480" y="239" text-anchor="middle" fill="#9be3bd" font-size="10.5">allow rule 'ReadFile' matches → Evaluate returns Allow → ToolRegistry.InvokeAsync runs</text>
  <line x1="480" y1="254" x2="480" y2="262" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- A4 WriteFile pended -->
  <rect x="80" y="264" width="800" height="52" rx="12" fill="#241d3d" stroke="#5cc8ff" stroke-width="1.8"/>
  <text x="480" y="285" text-anchor="middle" fill="#e9e4ff" font-size="12" font-weight="600">WriteFile → Ask → PENDED</text>
  <text x="480" y="303" text-anchor="middle" fill="#8fb6d6" font-size="10.5">no allow rule matches → Evaluate returns Ask('WriteFile(E:/app/config.json)')  ·  not executed yet</text>
  <line x1="480" y1="318" x2="480" y2="326" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- A5 batch settles -->
  <rect x="80" y="328" width="800" height="52" rx="12" fill="#241d3d" stroke="#a78bfa" stroke-width="1.8"/>
  <text x="480" y="349" text-anchor="middle" fill="#e9e4ff" font-size="12" font-weight="600">batch settles — one slot pended — Task.WhenAll — Agent.cs:889</text>
  <text x="480" y="367" text-anchor="middle" fill="#9d8bd6" font-size="10.5">ReadFile result ready  ·  WriteFile slot is a placeholder  ·  pended count = 1</text>
  <line x1="480" y1="382" x2="480" y2="390" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- A6 yield events + park -->
  <rect x="80" y="392" width="800" height="52" rx="12" fill="#241d3d" stroke="#a78bfa" stroke-width="1.8"/>
  <text x="480" y="413" text-anchor="middle" fill="#e9e4ff" font-size="12" font-weight="600">yield events + park the turn</text>
  <text x="480" y="431" text-anchor="middle" fill="#9d8bd6" font-size="10.5">ToolInvokedEvent(ReadFile)  ·  PermissionRequestedEvent(WriteFile)  ·  AgentResultEvent(AwaitingPermission)</text>
  <line x1="480" y1="446" x2="480" y2="454" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- A7 console renders -->
  <rect x="80" y="456" width="800" height="52" rx="12" fill="#241d3d" stroke="#5cc8ff" stroke-width="1.8"/>
  <text x="480" y="477" text-anchor="middle" fill="#e9e4ff" font-size="12" font-weight="600">Console renders 'Permission required' panel</text>
  <text x="480" y="495" text-anchor="middle" fill="#8fb6d6" font-size="10.5">spinner already stopped → ConsolePicker shows 4 rows (rule-sourced)  ·  turn is parked</text>
  <line x1="480" y1="510" x2="480" y2="518" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- A8 user picks -->
  <rect x="80" y="520" width="800" height="52" rx="12" fill="#241d3d" stroke="#5cc8ff" stroke-width="1.8"/>
  <text x="480" y="541" text-anchor="middle" fill="#e9e4ff" font-size="12" font-weight="600">User picks 'Allow always'</text>
  <text x="480" y="559" text-anchor="middle" fill="#8fb6d6" font-size="10.5">PermissionResponse(id, AllowAlways) → ResumeWithPermissionsAsync called by host</text>
  <line x1="480" y1="574" x2="480" y2="582" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- A9 resume -->
  <rect x="80" y="584" width="800" height="52" rx="12" fill="#241d3d" stroke="#a78bfa" stroke-width="1.8"/>
  <text x="480" y="605" text-anchor="middle" fill="#e9e4ff" font-size="12" font-weight="600">ResumeWithPermissionsAsync</text>
  <text x="480" y="623" text-anchor="middle" fill="#9d8bd6" font-size="10.5">RecordAlwaysAsync → session grant + append 'WriteFile(E:/app/config.json)' to permissions.local.json</text>
  <line x1="480" y1="638" x2="480" y2="646" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- A10 WriteFile executes -->
  <rect x="80" y="648" width="800" height="52" rx="12" fill="#241d3d" stroke="#a78bfa" stroke-width="1.8"/>
  <text x="480" y="669" text-anchor="middle" fill="#e9e4ff" font-size="12" font-weight="600">WriteFile executes  ·  OnPostToolUse fires  ·  OnPostToolBatch fires</text>
  <text x="480" y="687" text-anchor="middle" fill="#9d8bd6" font-size="10.5">merge full batch → append all results in order → clear PendingToolBatch</text>
  <line x1="480" y1="702" x2="480" y2="710" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- A11 loop continues -->
  <rect x="80" y="712" width="800" height="52" rx="12" fill="#241d3d" stroke="#6ee7a8" stroke-width="1.8"/>
  <text x="480" y="733" text-anchor="middle" fill="#e9e4ff" font-size="12" font-weight="600">loop continues — LLM sees both tool_results</text>
  <text x="480" y="751" text-anchor="middle" fill="#9be3bd" font-size="10.5">next iteration begins  ·  results delivered in call order regardless of completion order</text>
  <line x1="480" y1="766" x2="480" y2="774" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- A12 next turn auto-allowed -->
  <rect x="80" y="776" width="800" height="52" rx="12" fill="#241d3d" stroke="#6ee7a8" stroke-width="1.8"/>
  <text x="480" y="797" text-anchor="middle" fill="#e9e4ff" font-size="12" font-weight="600">next turn: WriteFile(E:/app/config.json) → grant matches → Allow</text>
  <text x="480" y="815" text-anchor="middle" fill="#9be3bd" font-size="10.5">no park  ·  auto-allowed from session grant  ·  deny rules still checked first</text>
</svg>
