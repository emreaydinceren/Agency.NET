<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" width="960" height="540"
     font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#a78bfa"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="960" height="540" rx="16" fill="#1b1530"/>
  <text x="480" y="42" text-anchor="middle" fill="#e9e4ff" font-size="25" font-weight="600" letter-spacing="1">Embeddings — Turning Meaning Into Coordinates</text>
  <text x="480" y="64" text-anchor="middle" fill="#9d8bd6" font-size="12" letter-spacing="1">An embedding model maps text to a point in space; similar meanings land close together</text>

  <!-- LEFT: sentences -->
  <text x="150" y="108" text-anchor="middle" fill="#c9bdf2" font-size="13" font-weight="600">Text</text>

  <rect x="30" y="124" width="240" height="46" rx="9" fill="#241d3d" stroke="#5cc8ff" stroke-width="1.5"/>
  <text x="46" y="146" fill="#e9e4ff" font-size="12">"How do I reset my password?"</text>
  <text x="46" y="162" fill="#7e6fb0" font-size="10.5">→ a list of 1024 numbers</text>

  <rect x="30" y="184" width="240" height="46" rx="9" fill="#241d3d" stroke="#5cc8ff" stroke-width="1.5"/>
  <text x="46" y="206" fill="#e9e4ff" font-size="12">"I forgot my login credentials"</text>
  <text x="46" y="222" fill="#7e6fb0" font-size="10.5">→ a list of 1024 numbers</text>

  <rect x="30" y="244" width="240" height="46" rx="9" fill="#241d3d" stroke="#f0a868" stroke-width="1.5"/>
  <text x="46" y="266" fill="#e9e4ff" font-size="12">"What time is the meeting?"</text>
  <text x="46" y="282" fill="#7e6fb0" font-size="10.5">→ a list of 1024 numbers</text>

  <!-- embedding model -->
  <rect x="330" y="170" width="150" height="76" rx="12" fill="#312856" stroke="#a78bfa" stroke-width="2"/>
  <text x="405" y="203" text-anchor="middle" fill="#e9e4ff" font-size="13" font-weight="600">Embedding</text>
  <text x="405" y="222" text-anchor="middle" fill="#e9e4ff" font-size="13" font-weight="600">model</text>
  <text x="405" y="240" text-anchor="middle" fill="#9d8bd6" font-size="10" font-family="monospace">text → vector</text>

  <line x1="274" y1="147" x2="328" y2="195" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="274" y1="207" x2="328" y2="208" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="274" y1="267" x2="328" y2="221" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- RIGHT: 2D plot -->
  <rect x="540" y="100" width="390" height="400" rx="12" fill="#15102a" stroke="#3a2f5e" stroke-width="1.5"/>
  <text x="735" y="126" text-anchor="middle" fill="#c9bdf2" font-size="13" font-weight="600">"Meaning space" (simplified to 2-D)</text>

  <!-- axes -->
  <line x1="575" y1="470" x2="900" y2="470" stroke="#4a3f70" stroke-width="1.2"/>
  <line x1="575" y1="150" x2="575" y2="470" stroke="#4a3f70" stroke-width="1.2"/>

  <!-- cluster: password-related (blue) -->
  <circle cx="660" cy="230" r="9" fill="#5cc8ff"/>
  <text x="674" y="227" fill="#bfe6ff" font-size="10.5">reset password</text>
  <circle cx="690" cy="262" r="9" fill="#5cc8ff"/>
  <text x="704" y="259" fill="#bfe6ff" font-size="10.5">forgot credentials</text>
  <ellipse cx="678" cy="247" rx="62" ry="50" fill="none" stroke="#5cc8ff" stroke-width="1.2" stroke-dasharray="4 4" opacity="0.6"/>

  <!-- query point (green) -->
  <circle cx="700" cy="300" r="8" fill="#6ee7a8"/>
  <text x="712" y="318" fill="#a8f0c8" font-size="10.5">your search ↑ lands near</text>
  <text x="712" y="332" fill="#a8f0c8" font-size="10.5">the password cluster</text>

  <!-- far point (orange) -->
  <circle cx="850" cy="430" r="9" fill="#f0a868"/>
  <text x="848" y="452" text-anchor="end" fill="#f5c89a" font-size="10.5">meeting time (far away)</text>

  <text x="735" y="495" text-anchor="middle" fill="#7e6fb0" font-size="10.5">"Close" = small cosine distance. Search = "find the nearest points."</text>
</svg>
