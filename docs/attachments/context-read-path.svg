  <rect x="650" y="204" width="296" height="38" rx="8" fill="#241d3d" stroke="#6ee7a8" stroke-width="1.2"/>
  <text x="798" y="219" text-anchor="middle" fill="#e9e4ff" font-size="11" font-weight="600">## Skills</text>
  <text x="798" y="233" text-anchor="middle" fill="#9be3bd" font-size="9">catalog lines from Skills.List()</text>

  <rect x="650" y="258" width="296" height="38" rx="8" fill="#241d3d" stroke="#6ee7a8" stroke-width="1.2"/>
  <text x="798" y="273" text-anchor="middle" fill="#e9e4ff" font-size="11" font-weight="600">date / OS / user lines</text>
  <text x="798" y="287" text-anchor="middle" fill="#9be3bd" font-size="9">from Temporal · Environment · User</text>

  <rect x="650" y="312" width="296" height="38" rx="8" fill="#241d3d" stroke="#6ee7a8" stroke-width="1.2"/>
  <text x="798" y="327" text-anchor="middle" fill="#e9e4ff" font-size="11" font-weight="600">Context window: est. remaining</text>
  <text x="798" y="341" text-anchor="middle" fill="#9be3bd" font-size="9">from TotalUsage.InputTokens</text>

  <!-- ── builder → P (system prompt) ── -->
  <line x1="480" y1="274" x2="480" y2="388" stroke="#a78bfa" stroke-width="1.6" marker-end="url(#arrow)"/>
  <rect x="280" y="390" width="400" height="38" rx="10" fill="#241d3d" stroke="#a78bfa" stroke-width="1.8"/>
  <text x="480" y="406" text-anchor="middle" fill="#e9e4ff" font-size="12" font-weight="600">system prompt string → ChatOptions.Instructions</text>
  <text x="480" y="421" text-anchor="middle" fill="#9d8bd6" font-size="10">Agent.cs:586  ·  passed to the LLM on every iteration</text>
