<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 960 490" xmlns="http://www.w3.org/2000/svg" width="960" height="490"
     font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-grn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6ee7a8"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="960" height="490" rx="16" fill="#1b1530"/>
  <text x="480" y="38" text-anchor="middle" fill="#e9e4ff" font-size="24" font-weight="600" letter-spacing="2">Memory — One Fact's Life Cycle</text>
  <text x="480" y="57" text-anchor="middle" fill="#9d8bd6" font-size="12" letter-spacing="1">'I prefer Python.'  distilled in Session N  →  recalled unprompted in Session N+1  (3 weeks later)</text>

  <!-- SESSION N header -->
  <rect x="30" y="68" width="408" height="26" rx="8" fill="#312856" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="234" y="85" text-anchor="middle" fill="#c9bdf2" font-size="12" font-weight="600">SESSION N</text>

  <!-- SESSION N+1 header -->
  <rect x="522" y="68" width="408" height="26" rx="8" fill="#312856" stroke="#5cc8ff" stroke-width="1.2"/>
  <text x="726" y="85" text-anchor="middle" fill="#8fb6d6" font-size="12" font-weight="600">SESSION N+1  (3 weeks later)</text>

  <!-- ── Session N steps ── -->
  <!-- A1 -->
  <rect x="30" y="102" width="408" height="44" rx="10" fill="#241d3d" stroke="#a78bfa" stroke-width="1.6"/>
  <text x="234" y="122" text-anchor="middle" fill="#e9e4ff" font-size="12" font-weight="600">User:  "I prefer Python."</text>
  <text x="234" y="138" text-anchor="middle" fill="#9d8bd6" font-size="11">ChatAsync → loop → OnPreIteration: store empty → [ ]</text>
  <line x1="234" y1="148" x2="234" y2="160" stroke="#a78bfa" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- A2 -->
  <rect x="30" y="162" width="408" height="44" rx="10" fill="#241d3d" stroke="#a78bfa" stroke-width="1.6"/>
  <text x="234" y="182" text-anchor="middle" fill="#e9e4ff" font-size="12" font-weight="600">LLM replies  →  OnAssistantTurn  →  timer restart</text>
  <text x="234" y="198" text-anchor="middle" fill="#9d8bd6" font-size="11">ctx: 'No memories yet.'  ·  tool calls if any</text>
  <line x1="234" y1="208" x2="234" y2="220" stroke="#a78bfa" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- A3 -->
  <rect x="30" y="222" width="408" height="44" rx="10" fill="#241d3d" stroke="#ffb454" stroke-width="1.6"/>
  <text x="234" y="242" text-anchor="middle" fill="#e9e4ff" font-size="12" font-weight="600">5 min idle  →  timer fires  →  DistillationJob{Inactivity}</text>
  <text x="234" y="258" text-anchor="middle" fill="#e0b985" font-size="11" font-family="monospace">InactivityTimerService enqueues job → channel</text>
  <line x1="234" y1="268" x2="234" y2="280" stroke="#a78bfa" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- A4 -->
  <rect x="30" y="282" width="408" height="44" rx="10" fill="#241d3d" stroke="#5cc8ff" stroke-width="1.6"/>
  <text x="234" y="302" text-anchor="middle" fill="#e9e4ff" font-size="12" font-weight="600">DistillerBackgroundService wakes</text>
  <text x="234" y="318" text-anchor="middle" fill="#8fb6d6" font-size="11" font-family="monospace">LLM: extract Fact{Language='Python', imp=0.7}</text>
  <line x1="234" y1="328" x2="234" y2="340" stroke="#a78bfa" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- A5 — highlighted green: LastWrittenAt bumped -->
  <rect x="30" y="342" width="408" height="44" rx="10" fill="#241d3d" stroke="#6ee7a8" stroke-width="2"/>
  <text x="234" y="362" text-anchor="middle" fill="#e9e4ff" font-size="12" font-weight="600">embed  →  UpsertAsync  →  LastWrittenAt bumped ✓</text>
  <text x="234" y="378" text-anchor="middle" fill="#9be3bd" font-size="11" font-family="monospace">watermark advanced  ·  the "doorbell" is set</text>
  <line x1="234" y1="388" x2="234" y2="400" stroke="#a78bfa" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- A6 -->
  <rect x="30" y="402" width="408" height="44" rx="10" fill="#241d3d" stroke="#a78bfa" stroke-width="1.6"/>
  <text x="234" y="422" text-anchor="middle" fill="#e9e4ff" font-size="12" font-weight="600">ChatSession.DisposeAsync  →  OnSessionEnd</text>
  <text x="234" y="438" text-anchor="middle" fill="#9d8bd6" font-size="11">Consolidator: 1 record, no duplicates → Memory_Done</text>

  <!-- ── Session N+1 steps ── -->
  <!-- B1 -->
  <rect x="522" y="102" width="408" height="44" rx="10" fill="#241d3d" stroke="#a78bfa" stroke-width="1.6"/>
  <text x="726" y="122" text-anchor="middle" fill="#e9e4ff" font-size="12" font-weight="600">User:  "Write me a script to deduplicate this list."</text>
  <text x="726" y="138" text-anchor="middle" fill="#9d8bd6" font-size="11">new session starts — no context yet</text>
  <line x1="726" y1="148" x2="726" y2="160" stroke="#a78bfa" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- B2 — highlighted blue: gate fires -->
  <rect x="522" y="162" width="408" height="44" rx="10" fill="#241d3d" stroke="#5cc8ff" stroke-width="2"/>
  <text x="726" y="182" text-anchor="middle" fill="#e9e4ff" font-size="12" font-weight="600">OnPreIteration  →  gate: LastWrittenAt changed  →  SEARCH</text>
  <text x="726" y="198" text-anchor="middle" fill="#8fb6d6" font-size="11" font-family="monospace">embed userMessage  →  IVectorStore.SearchAsync(qVec, k=20)</text>
  <line x1="726" y1="208" x2="726" y2="220" stroke="#a78bfa" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- B3 -->
  <rect x="522" y="222" width="408" height="44" rx="10" fill="#241d3d" stroke="#a78bfa" stroke-width="1.6"/>
  <text x="726" y="242" text-anchor="middle" fill="#e9e4ff" font-size="12" font-weight="600">Python Fact returned  (sim ≈ 0.62)</text>
  <text x="726" y="258" text-anchor="middle" fill="#9d8bd6" font-size="11">qVec ≈ 'deduplicate / list / script'  →  cosine match on Python pref</text>
  <line x1="726" y1="268" x2="726" y2="280" stroke="#a78bfa" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- B4 -->
  <rect x="522" y="282" width="408" height="44" rx="10" fill="#241d3d" stroke="#a78bfa" stroke-width="1.6"/>
  <text x="726" y="302" text-anchor="middle" fill="#e9e4ff" font-size="12" font-weight="600">RankingFormula  →  score 0.46  →  ctx.Knowledge</text>
  <text x="726" y="318" text-anchor="middle" fill="#9d8bd6" font-size="11" font-family="monospace">ctx.Knowledge.Records = [Fact{Language='Python'}]</text>
  <line x1="726" y1="328" x2="726" y2="340" stroke="#a78bfa" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- B5 -->
  <rect x="522" y="342" width="408" height="44" rx="10" fill="#241d3d" stroke="#a78bfa" stroke-width="1.6"/>
  <text x="726" y="362" text-anchor="middle" fill="#e9e4ff" font-size="12" font-weight="600">SystemPromptBuilder renders memory block</text>
  <text x="726" y="378" text-anchor="middle" fill="#9d8bd6" font-size="11" font-family="monospace">## Facts — Python preference  (Updated 3 weeks ago)</text>
  <line x1="726" y1="388" x2="726" y2="400" stroke="#a78bfa" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- B6 -->
  <rect x="522" y="402" width="408" height="44" rx="10" fill="#241d3d" stroke="#6ee7a8" stroke-width="1.8"/>
  <text x="726" y="422" text-anchor="middle" fill="#e9e4ff" font-size="12" font-weight="600">LLM writes a Python script  —  unprompted.</text>
  <text x="726" y="438" text-anchor="middle" fill="#9be3bd" font-size="11">memory correctly surfaced across 3-week gap</text>

  <!-- ── cross-column: LastWrittenAt doorbell ── -->
  <!-- From A5 right (438, 364) → B2 left (522, 184) via midpoint gap -->
  <path d="M438,364 L480,364 L480,184 L520,184"
        stroke="#6ee7a8" stroke-width="1.4" stroke-dasharray="5,3" fill="none" marker-end="url(#arrow-grn)"/>
  <text x="480" y="274" text-anchor="middle" fill="#9be3bd" font-size="10"
        transform="rotate(90 480 274)">LastWrittenAt doorbell</text>
</svg>
