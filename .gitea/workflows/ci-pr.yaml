name: CI (Pull Request)

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: dotnet-10
    container:
      image: mcr.microsoft.com/dotnet/sdk:10.0

    env:
      LlmTest__Claude__ApiKey: ${{ secrets.LlmTest__Claude__ApiKey }}
      LlmTest__OpenAI__ApiKey: ${{ secrets.LlmTest__OpenAI__ApiKey }}
      ConnectionStrings__PostgreSql: ${{ secrets.ConnectionStrings__PostgreSql }}

    steps:
      - name: 📥 Checkout
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          AUTH_URL="${GITHUB_SERVER_URL/http:\/\//http:\/\/x-access-token:$GITHUB_TOKEN@}"
          git clone --depth=1 "$AUTH_URL/$GITHUB_REPOSITORY.git" "$GITHUB_WORKSPACE"
          git -C "$GITHUB_WORKSPACE" -c advice.detachedHead=false checkout "$GITHUB_SHA"

      - name: 🧰 Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: 📦 Restore dependencies
        working-directory: src
        run: dotnet restore

      - name: 🛠️ Build Solution
        working-directory: src
        run: dotnet build --configuration Release --no-restore

      - name: 🧪 Run Unit Tests
        working-directory: src
        run: dotnet test --configuration Release --no-build --verbosity normal --filter "Category!=Functional&Category!=Eval"

      - name: 🧪 Run Functional Tests
        working-directory: src
        run: dotnet test --configuration Release --no-build --verbosity normal --filter "Category=Functional"
