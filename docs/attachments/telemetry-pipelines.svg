<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 960 560" xmlns="http://www.w3.org/2000/svg" width="960" height="560"
     font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-grn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6ee7a8"/>
    </marker>
    <marker id="arrow-blu" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5cc8ff"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="960" height="560" rx="16" fill="#1b1530"/>
  <text x="480" y="38" text-anchor="middle" fill="#e9e4ff" font-size="24" font-weight="600" letter-spacing="2">Three Independently-Disableable Pipelines</text>
  <text x="480" y="56" text-anchor="middle" fill="#9d8bd6" font-size="12" letter-spacing="1">AddSource/AddMeter('Agency.*')  ·  one wildcard subscription  ·  TelemetryServiceCollectionExtensions.cs:72,92</text>

  <!-- ── Row 1: instrumented components ── -->
  <rect x="20" y="68" width="754" height="92" rx="12" fill="#1a1335" stroke="#ffb454" stroke-width="1.4"/>
  <text x="397" y="84" text-anchor="middle" fill="#e0b985" font-size="10" font-weight="600">Instrumented components  (no OTel dependency — name their own ActivitySource / Meter)</text>

  <rect x="30"  y="92" width="168" height="54" rx="10" fill="#241d3d" stroke="#ffb454" stroke-width="1.4"/>
  <text x="114" y="114" text-anchor="middle" fill="#e9e4ff" font-size="11" font-weight="600">Agency.Harness.Agent</text>
  <text x="114" y="130" text-anchor="middle" fill="#e0b985" font-size="10" font-family="monospace">ActivitySource + Meter</text>

  <rect x="212" y="92" width="168" height="54" rx="10" fill="#241d3d" stroke="#ffb454" stroke-width="1.4"/>
  <text x="296" y="114" text-anchor="middle" fill="#e9e4ff" font-size="11" font-weight="600">Agency.Memory.Sql.Sqlite</text>
  <text x="296" y="130" text-anchor="middle" fill="#e0b985" font-size="10" font-family="monospace">ActivitySource + Meter</text>

  <rect x="394" y="92" width="168" height="54" rx="10" fill="#241d3d" stroke="#ffb454" stroke-width="1.4"/>
  <text x="478" y="114" text-anchor="middle" fill="#e9e4ff" font-size="11" font-weight="600">Agency.Embeddings.OpenAI</text>
  <text x="478" y="130" text-anchor="middle" fill="#e0b985" font-size="10" font-family="monospace">ActivitySource + Meter</text>

  <rect x="576" y="92" width="188" height="54" rx="10" fill="#241d3d" stroke="#ffb454" stroke-width="1.4"/>
  <text x="670" y="114" text-anchor="middle" fill="#e9e4ff" font-size="11" font-weight="600">Agency.Harness.Loop</text>
  <text x="670" y="130" text-anchor="middle" fill="#e0b985" font-size="10" font-family="monospace">LoopInstrumentation</text>

  <!-- ILogger (separate chain) -->
  <rect x="796" y="92" width="144" height="54" rx="10" fill="#241d3d" stroke="#5cc8ff" stroke-width="1.4"/>
  <text x="868" y="114" text-anchor="middle" fill="#e9e4ff" font-size="11" font-weight="600">ILogger&lt;T&gt;</text>
  <text x="868" y="130" text-anchor="middle" fill="#8fb6d6" font-size="10">(everywhere)</text>

  <!-- ── fan-in bus: components → W ── -->
  <line x1="114" y1="148" x2="114" y2="168" stroke="#ffb454" stroke-width="1.2"/>
  <line x1="296" y1="148" x2="296" y2="168" stroke="#ffb454" stroke-width="1.2"/>
  <line x1="478" y1="148" x2="478" y2="168" stroke="#ffb454" stroke-width="1.2"/>
  <line x1="670" y1="148" x2="670" y2="168" stroke="#ffb454" stroke-width="1.2"/>
  <line x1="114" y1="168" x2="670" y2="168" stroke="#ffb454" stroke-width="1.4"/>
  <text x="397" y="164" text-anchor="middle" fill="#e0b985" font-size="9">named  Agency.*</text>
  <line x1="397" y1="168" x2="397" y2="186" stroke="#a78bfa" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- ILogger → SL -->
  <line x1="868" y1="148" x2="868" y2="186" stroke="#5cc8ff" stroke-width="1.5" marker-end="url(#arrow-blu)"/>

  <!-- ── Row 2: W (hub) + SL ── -->
  <rect x="150" y="188" width="494" height="54" rx="12" fill="#241d3d" stroke="#a78bfa" stroke-width="1.8"/>
  <text x="397" y="210" text-anchor="middle" fill="#e9e4ff" font-size="12" font-weight="600">AddSource / AddMeter('Agency.*')</text>
  <text x="397" y="228" text-anchor="middle" fill="#9d8bd6" font-size="10" font-family="monospace">TelemetryServiceCollectionExtensions.cs:72,92</text>

  <rect x="796" y="188" width="144" height="54" rx="12" fill="#241d3d" stroke="#5cc8ff" stroke-width="1.8"/>
  <text x="868" y="210" text-anchor="middle" fill="#e9e4ff" font-size="12" font-weight="600">Serilog provider</text>
  <text x="868" y="228" text-anchor="middle" fill="#8fb6d6" font-size="10">(or NullLoggerProvider)</text>

  <!-- ── fan-out bus: W → TP + MP ── -->
  <line x1="397" y1="244" x2="397" y2="262" stroke="#a78bfa" stroke-width="1.4"/>
  <line x1="220" y1="262" x2="570" y2="262" stroke="#a78bfa" stroke-width="1.4"/>
  <line x1="220" y1="262" x2="220" y2="280" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="570" y1="262" x2="570" y2="280" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="220" y="259" text-anchor="middle" fill="#7e6fb0" font-size="9">traces</text>
  <text x="570" y="259" text-anchor="middle" fill="#7e6fb0" font-size="9">metrics</text>

  <!-- ILogger → AF (long vertical) -->
  <line x1="868" y1="244" x2="868" y2="402" stroke="#5cc8ff" stroke-width="1.4" marker-end="url(#arrow-blu)"/>

  <!-- ── Row 3: TracerProvider + MeterProvider ── -->
  <rect x="80"  y="282" width="280" height="54" rx="12" fill="#241d3d" stroke="#a78bfa" stroke-width="1.8"/>
  <text x="220" y="304" text-anchor="middle" fill="#e9e4ff" font-size="12" font-weight="600">TracerProvider</text>
  <text x="220" y="320" text-anchor="middle" fill="#9d8bd6" font-size="10">+ Sampler</text>

  <rect x="430" y="282" width="280" height="54" rx="12" fill="#241d3d" stroke="#a78bfa" stroke-width="1.8"/>
  <text x="570" y="304" text-anchor="middle" fill="#e9e4ff" font-size="12" font-weight="600">MeterProvider</text>
  <text x="570" y="320" text-anchor="middle" fill="#9d8bd6" font-size="10">+ PeriodicReader (15s)</text>

  <line x1="220" y1="338" x2="220" y2="356" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="570" y1="338" x2="570" y2="356" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── Row 4: exporters ── -->
  <rect x="80"  y="358" width="280" height="44" rx="10" fill="#241d3d" stroke="#5cc8ff" stroke-width="1.6"/>
  <text x="220" y="380" text-anchor="middle" fill="#e9e4ff" font-size="12" font-weight="600">FileSpanExporter</text>
  <text x="220" y="395" text-anchor="middle" fill="#8fb6d6" font-size="10" font-family="monospace">src/Harness/Agency.Observability/</text>

  <rect x="430" y="358" width="280" height="44" rx="10" fill="#241d3d" stroke="#5cc8ff" stroke-width="1.6"/>
  <text x="570" y="380" text-anchor="middle" fill="#e9e4ff" font-size="12" font-weight="600">FileMetricExporter</text>
  <text x="570" y="395" text-anchor="middle" fill="#8fb6d6" font-size="10" font-family="monospace">src/Harness/Agency.Observability/</text>

  <rect x="796" y="404" width="144" height="44" rx="10" fill="#241d3d" stroke="#5cc8ff" stroke-width="1.6"/>
  <text x="868" y="424" text-anchor="middle" fill="#e9e4ff" font-size="12" font-weight="600">log file</text>
  <text x="868" y="440" text-anchor="middle" fill="#8fb6d6" font-size="10" font-family="monospace">app-yyyy-MM-dd.log</text>

  <line x1="220" y1="404" x2="220" y2="422" stroke="#6ee7a8" stroke-width="1.5" marker-end="url(#arrow-grn)"/>
  <line x1="570" y1="404" x2="570" y2="422" stroke="#6ee7a8" stroke-width="1.5" marker-end="url(#arrow-grn)"/>

  <!-- ── Row 5: output files ── -->
  <rect x="80"  y="424" width="280" height="44" rx="10" fill="#241d3d" stroke="#6ee7a8" stroke-width="1.6"/>
  <text x="220" y="445" text-anchor="middle" fill="#e9e4ff" font-size="12" font-weight="600">traces-yyyy-MM-dd.log</text>
  <text x="220" y="461" text-anchor="middle" fill="#9be3bd" font-size="10">one OTLP-JSON span per line</text>

  <rect x="430" y="424" width="280" height="44" rx="10" fill="#241d3d" stroke="#6ee7a8" stroke-width="1.6"/>
  <text x="570" y="445" text-anchor="middle" fill="#e9e4ff" font-size="12" font-weight="600">metrics-yyyy-MM-dd.log</text>
  <text x="570" y="461" text-anchor="middle" fill="#9be3bd" font-size="10">exported every 15 seconds</text>

  <text x="480" y="498" text-anchor="middle" fill="#7e6fb0" font-size="11">traces off: sampler drop-all  ·  metrics off: no PeriodicReader  ·  logs off: NullLoggerProvider  ·  independent of each other</text>
  <text x="480" y="516" text-anchor="middle" fill="#7e6fb0" font-size="11">add a new library named Agency.* → it appears in all three pipelines with zero host changes</text>
</svg>
