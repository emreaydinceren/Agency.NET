<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 960 680" xmlns="http://www.w3.org/2000/svg" width="960" height="680"
     font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-grn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6ee7a8"/>
    </marker>
    <marker id="arrow-blu" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5cc8ff"/>
    </marker>
    <marker id="arrow-amb" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ffb454"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="960" height="680" rx="16" fill="#1b1530"/>
  <text x="480" y="40" text-anchor="middle" fill="#e9e4ff" font-size="24" font-weight="600" letter-spacing="2">Nine Lifecycle Events</text>
  <text x="480" y="58" text-anchor="middle" fill="#9d8bd6" font-size="12" letter-spacing="1">Agency.Harness.Agent  ·  fired in order per turn  ·  registered via HarnessBuilder</text>

  <!-- ── main column: x=80 w=460 center=310 ── -->

  <rect x="80" y="72" width="460" height="44" rx="12" fill="#241d3d" stroke="#a78bfa" stroke-width="1.8"/>
  <text x="310" y="92" text-anchor="middle" fill="#e9e4ff" font-size="13" font-weight="600">OnUserPromptSubmit</text>
  <text x="310" y="108" text-anchor="middle" fill="#9d8bd6" font-size="11">every turn · fires first · can intercept or mutate the user message</text>
  <line x1="310" y1="118" x2="310" y2="134" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="80" y="136" width="460" height="44" rx="12" fill="#241d3d" stroke="#a78bfa" stroke-width="1.8"/>
  <text x="310" y="156" text-anchor="middle" fill="#e9e4ff" font-size="13" font-weight="600">OnSessionStarted</text>
  <text x="310" y="172" text-anchor="middle" fill="#9d8bd6" font-size="11">every turn · Session.Id is assigned once and stays stable across all turns</text>
  <line x1="310" y1="182" x2="310" y2="198" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- back-edge target -->
  <rect x="80" y="200" width="460" height="44" rx="12" fill="#241d3d" stroke="#5cc8ff" stroke-width="1.8"/>
  <text x="310" y="220" text-anchor="middle" fill="#e9e4ff" font-size="13" font-weight="600">OnPreIteration</text>
  <text x="310" y="236" text-anchor="middle" fill="#8fb6d6" font-size="11">per iteration · retrieval writes ctx.Knowledge / ctx.Memory here</text>
  <line x1="310" y1="246" x2="310" y2="262" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="80" y="264" width="460" height="44" rx="12" fill="#241d3d" stroke="#ffb454" stroke-width="1.8"/>
  <text x="310" y="284" text-anchor="middle" fill="#e9e4ff" font-size="13" font-weight="600">LLM responds</text>
  <text x="310" y="300" text-anchor="middle" fill="#e0b985" font-size="11">THINK · reads rebuilt system prompt + full conversation history</text>
  <line x1="310" y1="310" x2="310" y2="326" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="80" y="328" width="460" height="44" rx="12" fill="#241d3d" stroke="#ffb454" stroke-width="1.8"/>
  <text x="310" y="348" text-anchor="middle" fill="#e9e4ff" font-size="13" font-weight="600">OnAssistantTurn</text>
  <text x="310" y="364" text-anchor="middle" fill="#e0b985" font-size="11">per iteration · memory restarts inactivity timer here</text>
  <line x1="310" y1="374" x2="310" y2="390" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="80" y="392" width="460" height="44" rx="10" fill="#312856" stroke="#a78bfa" stroke-width="1.6"/>
  <text x="310" y="418" text-anchor="middle" fill="#c9bdf2" font-size="13" font-weight="600">tools requested?</text>

  <!-- yes → right column -->
  <line x1="542" y1="414" x2="588" y2="414" stroke="#5cc8ff" stroke-width="1.5" marker-end="url(#arrow-blu)"/>
  <text x="565" y="409" text-anchor="middle" fill="#8fb6d6" font-size="10">yes</text>

  <!-- no → OnStop -->
  <line x1="310" y1="438" x2="310" y2="486" stroke="#6ee7a8" stroke-width="1.5" marker-end="url(#arrow-grn)"/>
  <text x="326" y="466" fill="#9be3bd" font-size="10">no</text>

  <rect x="80" y="488" width="460" height="44" rx="12" fill="#241d3d" stroke="#6ee7a8" stroke-width="1.8"/>
  <text x="310" y="508" text-anchor="middle" fill="#e9e4ff" font-size="13" font-weight="600">OnStop</text>
  <text x="310" y="524" text-anchor="middle" fill="#9be3bd" font-size="11">LLM returned no tool calls · loop exits · AgentResultEvent yielded</text>

  <line x1="310" y1="534" x2="310" y2="570" stroke="#7e6fb0" stroke-width="1.4" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
  <text x="340" y="556" fill="#7e6fb0" font-size="10">session disposed</text>

  <rect x="80" y="572" width="460" height="44" rx="12" fill="#241d3d" stroke="#6ee7a8" stroke-width="1.8" stroke-dasharray="6,4"/>
  <text x="310" y="592" text-anchor="middle" fill="#e9e4ff" font-size="13" font-weight="600">OnSessionEnd</text>
  <text x="310" y="608" text-anchor="middle" fill="#9be3bd" font-size="11">once per session lifetime · DisposeAsync → RaiseSessionEndAsync (:133)</text>

  <!-- ── right column: tool branch x=590 w=350 center=765 ── -->

  <rect x="590" y="392" width="350" height="44" rx="12" fill="#241d3d" stroke="#ffb454" stroke-width="1.8"/>
  <text x="765" y="412" text-anchor="middle" fill="#e9e4ff" font-size="13" font-weight="600">OnPreToolUse</text>
  <text x="765" y="428" text-anchor="middle" fill="#e0b985" font-size="11">per tool · Allow / Deny / Rewrite / Ask · deny wins on compose</text>
  <line x1="765" y1="438" x2="765" y2="454" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="590" y="456" width="350" height="44" rx="12" fill="#241d3d" stroke="#5cc8ff" stroke-width="1.8"/>
  <text x="765" y="476" text-anchor="middle" fill="#e9e4ff" font-size="13" font-weight="600">Tool runs  (or is blocked)</text>
  <text x="765" y="492" text-anchor="middle" fill="#8fb6d6" font-size="11">ToolRegistry.InvokeAsync · exceptions become IsError results</text>
  <line x1="765" y1="502" x2="765" y2="518" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="590" y="520" width="350" height="44" rx="12" fill="#241d3d" stroke="#5cc8ff" stroke-width="1.8"/>
  <text x="765" y="540" text-anchor="middle" fill="#e9e4ff" font-size="13" font-weight="600">OnPostToolUse</text>
  <text x="765" y="556" text-anchor="middle" fill="#8fb6d6" font-size="11">per tool · can mutate the tool result</text>
  <line x1="765" y1="566" x2="765" y2="582" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="590" y="584" width="350" height="44" rx="12" fill="#241d3d" stroke="#a78bfa" stroke-width="1.8"/>
  <text x="765" y="604" text-anchor="middle" fill="#e9e4ff" font-size="13" font-weight="600">OnPostToolBatch</text>
  <text x="765" y="620" text-anchor="middle" fill="#9d8bd6" font-size="11">once per batch · all parallel tool results have settled</text>

  <!-- ── back edge: Batch right → margin → PreIter right ── -->
  <path d="M 940,606 L 950,606 L 950,222 L 542,222" fill="none" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="948" y="340" fill="#7e6fb0" font-size="9" text-anchor="start">↺</text>
</svg>
