name: CI (Pull Request)

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: dotnet-10
    container:
      image: mcr.microsoft.com/dotnet/sdk:10.0
    defaults:
      run:
        shell: bash

    env:
      LlmTest__Claude__ApiKey: ${{ secrets.LlmTest__Claude__ApiKey }}
      LlmTest__OpenAI__ApiKey: ${{ secrets.LlmTest__OpenAI__ApiKey }}
      ConnectionStrings__PostgreSql: ${{ secrets.ConnectionStrings__PostgreSql }}

    steps:
      - name: 📥 Checkout
        env:
          GIT_TOKEN: ${{ github.token }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          AUTH_URL="${GITHUB_SERVER_URL/http:\/\//http:\/\/x-access-token:$GIT_TOKEN@}"
          BRANCH="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          git clone --depth=1 --branch "$BRANCH" "$AUTH_URL/$GITHUB_REPOSITORY.git" "$GITHUB_WORKSPACE"
          git -C "$GITHUB_WORKSPACE" -c advice.detachedHead=false checkout "$GITHUB_SHA"

      - name: 📦 Restore dependencies
        working-directory: src
        run: dotnet restore

      - name: 🛠️ Build Solution
        working-directory: src
        run: dotnet build --configuration Release --no-restore

      - name: 🧪 Run Unit Tests
        working-directory: src
        run: |
          for i in 1 2 3; do
            if dotnet test --configuration Release --no-build --verbosity normal --filter "Category!=Functional&Category!=Eval"; then
              break
            fi
            [ $i -eq 3 ] && exit 1 || echo "Attempt $i failed, retrying..."
          done

      - name: 🧪 Run Functional Tests
        working-directory: src
        run: |
          for i in 1 2 3; do
            if dotnet test --configuration Release --no-build --verbosity normal --filter "Category=Functional"; then
              break
            fi
            [ $i -eq 3 ] && exit 1 || echo "Attempt $i failed, retrying..."
          done