<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 960 754" xmlns="http://www.w3.org/2000/svg" width="960" height="754"
     font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-grn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6ee7a8"/>
    </marker>
    <marker id="arrow-amb" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ffb454"/>
    </marker>
    <marker id="arrow-blu" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5cc8ff"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="960" height="754" rx="16" fill="#1b1530"/>
  <text x="480" y="44" text-anchor="middle" fill="#e9e4ff" font-size="26" font-weight="600" letter-spacing="2">Decision Pipeline — per Tool Call</text>
  <text x="480" y="63" text-anchor="middle" fill="#9d8bd6" font-size="12" letter-spacing="1">Agent.cs:725–806  ·  parallel across all function calls in one batch</text>

  <!-- ── LLM emits batch ── -->
  <rect x="260" y="76" width="440" height="48" rx="12" fill="#241d3d" stroke="#ffb454" stroke-width="1.8"/>
  <text x="480" y="99" text-anchor="middle" fill="#e9e4ff" font-size="14" font-weight="600">LLM emits a tool-call batch</text>
  <text x="480" y="117" text-anchor="middle" fill="#e0b985" font-size="11" font-family="monospace">per call  ·  in parallel</text>
  <line x1="480" y1="126" x2="480" y2="141" stroke="#a78bfa" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- ── 1. OnPreToolUse hooks ── -->
  <rect x="180" y="143" width="600" height="58" rx="12" fill="#241d3d" stroke="#ffb454" stroke-width="1.8"/>
  <text x="480" y="167" text-anchor="middle" fill="#e9e4ff" font-size="13" font-weight="600">1.  OnPreToolUse hooks  (operator policy)</text>
  <text x="480" y="185" text-anchor="middle" fill="#e0b985" font-size="11">Allow / Deny / Rewrite / Ask  ·  Rewrite replaces input  ·  Ask flags for human confirmation</text>
  <line x1="480" y1="203" x2="480" y2="218" stroke="#a78bfa" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- ── 2. PermissionEvaluator ── -->
  <rect x="180" y="220" width="600" height="106" rx="12" fill="#241d3d" stroke="#a78bfa" stroke-width="2"/>
  <text x="480" y="244" text-anchor="middle" fill="#e9e4ff" font-size="13" font-weight="600">2.  PermissionEvaluator</text>
  <text x="480" y="261" text-anchor="middle" fill="#9d8bd6" font-size="11">pure decision — never blocks, never renders, never I/O</text>
  <text x="200" y="280" fill="#e9e4ff" font-size="11">  a.  deny rules match    →  Deny</text>
  <text x="770" y="280" text-anchor="end" fill="#9d8bd6" font-size="11" font-family="monospace">config ∪ persisted grants</text>
  <text x="200" y="299" fill="#e9e4ff" font-size="11">  b.  allow rules match   →  Allow</text>
  <text x="200" y="318" fill="#e9e4ff" font-size="11">  c.  unresolved           →  Ask</text>
  <text x="770" y="318" text-anchor="end" fill="#9d8bd6" font-size="11">(or Deny when OnUnresolved=Deny — headless)</text>

  <!-- ── verdict bus ── -->
  <line x1="480" y1="328" x2="480" y2="344" stroke="#a78bfa" stroke-width="1.6"/>
  <line x1="170" y1="344" x2="790" y2="344" stroke="#a78bfa" stroke-width="1.6"/>
  <line x1="170" y1="344" x2="170" y2="360" stroke="#6ee7a8" stroke-width="1.5" marker-end="url(#arrow-grn)"/>
  <line x1="480" y1="344" x2="480" y2="360" stroke="#ffb454" stroke-width="1.5" marker-end="url(#arrow-amb)"/>
  <line x1="790" y1="344" x2="790" y2="360" stroke="#5cc8ff" stroke-width="1.5" marker-end="url(#arrow-blu)"/>

  <!-- ── Allow ── -->
  <rect x="30" y="362" width="280" height="56" rx="10" fill="#241d3d" stroke="#6ee7a8" stroke-width="1.6"/>
  <text x="170" y="386" text-anchor="middle" fill="#e9e4ff" font-size="13" font-weight="600">Allow</text>
  <text x="170" y="404" text-anchor="middle" fill="#9be3bd" font-size="11" font-family="monospace">3. ToolRegistry.InvokeAsync</text>

  <!-- ── Deny ── -->
  <rect x="340" y="362" width="280" height="56" rx="10" fill="#241d3d" stroke="#ffb454" stroke-width="1.6"/>
  <text x="480" y="386" text-anchor="middle" fill="#e9e4ff" font-size="13" font-weight="600">Deny</text>
  <text x="480" y="404" text-anchor="middle" fill="#e0b985" font-size="11">[Blocked] {reason}  ·  IsError: true</text>

  <!-- ── Ask / Pend ── -->
  <rect x="650" y="362" width="280" height="56" rx="10" fill="#241d3d" stroke="#5cc8ff" stroke-width="1.6"/>
  <text x="790" y="386" text-anchor="middle" fill="#e9e4ff" font-size="13" font-weight="600">Ask  →  PENDED</text>
  <text x="790" y="404" text-anchor="middle" fill="#8fb6d6" font-size="11">not executed  ·  no result yet</text>

  <!-- ── merge → Task.WhenAll ── -->
  <line x1="170" y1="420" x2="170" y2="436" stroke="#a78bfa" stroke-width="1.5"/>
  <line x1="480" y1="420" x2="480" y2="436" stroke="#a78bfa" stroke-width="1.5"/>
  <line x1="790" y1="420" x2="790" y2="436" stroke="#a78bfa" stroke-width="1.5"/>
  <line x1="170" y1="436" x2="790" y2="436" stroke="#a78bfa" stroke-width="1.5"/>
  <line x1="480" y1="436" x2="480" y2="452" stroke="#a78bfa" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- ── Task.WhenAll ── -->
  <rect x="200" y="454" width="560" height="36" rx="10" fill="#241d3d" stroke="#a78bfa" stroke-width="1.6"/>
  <text x="480" y="477" text-anchor="middle" fill="#e9e4ff" font-size="13" font-weight="600">batch settles — Task.WhenAll — Agent.cs:876</text>
  <line x1="480" y1="492" x2="480" y2="508" stroke="#a78bfa" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- ── decision: any pended? ── -->
  <rect x="240" y="510" width="480" height="36" rx="8" fill="#312856" stroke="#a78bfa" stroke-width="1.4"/>
  <text x="480" y="533" text-anchor="middle" fill="#c9bdf2" font-size="13" font-weight="600">any pended calls?</text>

  <!-- ── fork ── -->
  <line x1="480" y1="548" x2="480" y2="558" stroke="#a78bfa" stroke-width="1.5"/>
  <line x1="260" y1="558" x2="715" y2="558" stroke="#a78bfa" stroke-width="1.5"/>
  <line x1="260" y1="558" x2="260" y2="572" stroke="#6ee7a8" stroke-width="1.5" marker-end="url(#arrow-grn)"/>
  <text x="228" y="555" fill="#9be3bd" font-size="10">no</text>
  <line x1="715" y1="558" x2="715" y2="572" stroke="#5cc8ff" stroke-width="1.5" marker-end="url(#arrow-blu)"/>
  <text x="723" y="555" fill="#8fb6d6" font-size="10">yes</text>

  <!-- ── no branch ── -->
  <rect x="40" y="574" width="440" height="50" rx="10" fill="#241d3d" stroke="#6ee7a8" stroke-width="1.6"/>
  <text x="260" y="598" text-anchor="middle" fill="#e9e4ff" font-size="13" font-weight="600">no  →  continue loop</text>
  <text x="260" y="615" text-anchor="middle" fill="#9be3bd" font-size="11">append results in batch order  ·  next iteration</text>

  <!-- ── yes branch ── -->
  <rect x="500" y="574" width="430" height="152" rx="10" fill="#241d3d" stroke="#5cc8ff" stroke-width="1.6"/>
  <text x="715" y="598" text-anchor="middle" fill="#e9e4ff" font-size="13" font-weight="600">yes  →  park the turn</text>
  <text x="715" y="618" text-anchor="middle" fill="#8fb6d6" font-size="11">yield ToolInvokedEvent  (completed siblings)</text>
  <text x="715" y="636" text-anchor="middle" fill="#8fb6d6" font-size="11">yield PermissionRequestedEvent  per pended call</text>
  <text x="715" y="654" text-anchor="middle" fill="#8fb6d6" font-size="11">yield AgentResultEvent(AwaitingPermission)  →  turn ends</text>
  <line x1="520" y1="664" x2="920" y2="664" stroke="#312856" stroke-width="1.2"/>
  <text x="715" y="679" text-anchor="middle" fill="#9d8bd6" font-size="11">……  host collects answers  ……</text>
  <text x="715" y="698" text-anchor="middle" fill="#8fb6d6" font-size="11">ResumeWithPermissionsAsync  →  execute/deny  ·  loop continues</text>
</svg>
