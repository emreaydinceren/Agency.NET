# git-cliff configuration — https://git-cliff.org/docs/configuration
#
# Generates CHANGELOG.md and per-release notes from Conventional Commits (the format this repo's
# history already follows — `type(scope): subject`, e.g. `fix(ci):`, `feat(harness):`). See
# Agents/Releasing.md for how this plugs into the release workflow (RT19).

[changelog]
header = """
# Changelog

All notable changes to this project are documented in this file, generated from
[Conventional Commits](https://www.conventionalcommits.org/) via [git-cliff](https://git-cliff.org/).

"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}*({{ commit.scope }})* {% endif %}{{ commit.message | upper_first }} ([{{ commit.id | truncate(length=7, end="") }}]({{ "https://github.com/emreaydinceren/Agency.NET/commit/" ~ commit.id }}))\
    {% endfor %}
{% endfor %}\n
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9]*"
sort_commits = "oldest"
commit_parsers = [
    { message = "(?i)^feat", group = "Features" },
    { message = "(?i)^fix", group = "Bug Fixes" },
    { message = "(?i)^perf", group = "Performance" },
    { message = "(?i)^refactor", group = "Refactor" },
    { message = "(?i)^docs", group = "Documentation" },
    { message = "(?i)^ci", group = "CI/CD" },
    { message = "(?i)^build", group = "Build System" },
    { message = "(?i)^test", group = "Testing" },
    { message = "(?i)^chore\\(release\\)", skip = true },
    { message = "(?i)^chore", group = "Miscellaneous Tasks" },
    { message = "(?i)^style", group = "Styling" },
    { message = "(?i)^revert", group = "Reverts" },
    { message = "(?i)^remove", group = "Removed" },
    { message = "^Merge", skip = true },
]
