<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 960 470" xmlns="http://www.w3.org/2000/svg" width="960" height="470"
     font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <marker id="a2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#a78bfa"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="960" height="470" rx="16" fill="#1b1530"/>
  <text x="480" y="40" text-anchor="middle" fill="#e9e4ff" font-size="25" font-weight="600" letter-spacing="1">The Ingestion Pipeline — Load → Split → Embed → Store</text>
  <text x="480" y="62" text-anchor="middle" fill="#9d8bd6" font-size="12" letter-spacing="1">Driven by the REPL ( /add-file, /add-folder ) — never by the LLM</text>

  <!-- stage 1: load -->
  <rect x="30" y="120" width="170" height="92" rx="12" fill="#241d3d" stroke="#5cc8ff" stroke-width="1.6"/>
  <text x="115" y="150" text-anchor="middle" fill="#e9e4ff" font-size="14" font-weight="600">1 · Load</text>
  <text x="115" y="174" text-anchor="middle" fill="#9d8bd6" font-size="11">read the file(s)</text>
  <text x="115" y="192" text-anchor="middle" fill="#7e6fb0" font-size="10" font-family="monospace">FileLoader /</text>
  <text x="115" y="205" text-anchor="middle" fill="#7e6fb0" font-size="10" font-family="monospace">DirectoryLoader</text>

  <!-- stage 2: split -->
  <rect x="230" y="120" width="170" height="92" rx="12" fill="#241d3d" stroke="#5cc8ff" stroke-width="1.6"/>
  <text x="315" y="150" text-anchor="middle" fill="#e9e4ff" font-size="14" font-weight="600">2 · Split</text>
  <text x="315" y="174" text-anchor="middle" fill="#9d8bd6" font-size="11">cut into ~512-token</text>
  <text x="315" y="190" text-anchor="middle" fill="#9d8bd6" font-size="11">chunks (64 overlap)</text>
  <text x="315" y="206" text-anchor="middle" fill="#7e6fb0" font-size="10" font-family="monospace">TextSplitter</text>

  <!-- stage 3: embed -->
  <rect x="430" y="120" width="170" height="92" rx="12" fill="#241d3d" stroke="#5cc8ff" stroke-width="1.6"/>
  <text x="515" y="150" text-anchor="middle" fill="#e9e4ff" font-size="14" font-weight="600">3 · Embed</text>
  <text x="515" y="174" text-anchor="middle" fill="#9d8bd6" font-size="11">each chunk → vector</text>
  <text x="515" y="190" text-anchor="middle" fill="#9d8bd6" font-size="11">of numbers</text>
  <text x="515" y="206" text-anchor="middle" fill="#7e6fb0" font-size="10" font-family="monospace">EmbeddingGenerator</text>

  <!-- stage 4: store -->
  <rect x="630" y="120" width="170" height="92" rx="12" fill="#241d3d" stroke="#6ee7a8" stroke-width="1.8"/>
  <text x="715" y="150" text-anchor="middle" fill="#e9e4ff" font-size="14" font-weight="600">4 · Store</text>
  <text x="715" y="174" text-anchor="middle" fill="#9d8bd6" font-size="11">UpsertAsync with a</text>
  <text x="715" y="190" text-anchor="middle" fill="#9d8bd6" font-size="11">scope tag attached</text>
  <text x="715" y="206" text-anchor="middle" fill="#7e6fb0" font-size="10" font-family="monospace">IVectorStore</text>

  <line x1="202" y1="166" x2="226" y2="166" stroke="#a78bfa" stroke-width="1.8" marker-end="url(#a2)"/>
  <line x1="402" y1="166" x2="426" y2="166" stroke="#a78bfa" stroke-width="1.8" marker-end="url(#a2)"/>
  <line x1="602" y1="166" x2="626" y2="166" stroke="#a78bfa" stroke-width="1.8" marker-end="url(#a2)"/>

  <!-- DB -->
  <rect x="828" y="118" width="104" height="96" rx="10" fill="#15102a" stroke="#6ee7a8" stroke-width="1.5"/>
  <text x="880" y="150" text-anchor="middle" fill="#a8f0c8" font-size="12" font-weight="600">vector</text>
  <text x="880" y="168" text-anchor="middle" fill="#a8f0c8" font-size="12" font-weight="600">store</text>
  <text x="880" y="190" text-anchor="middle" fill="#7e6fb0" font-size="10">SQLite or</text>
  <text x="880" y="203" text-anchor="middle" fill="#7e6fb0" font-size="10">Postgres</text>
  <line x1="802" y1="166" x2="826" y2="166" stroke="#6ee7a8" stroke-width="1.8" marker-end="url(#a2)"/>

  <!-- row stored -->
  <rect x="30" y="270" width="902" height="150" rx="12" fill="#15102a" stroke="#3a2f5e" stroke-width="1.5"/>
  <text x="481" y="296" text-anchor="middle" fill="#c9bdf2" font-size="13" font-weight="600">What one stored chunk looks like (a row in semantic_kv_store)</text>

  <rect x="55" y="316" width="150" height="80" rx="8" fill="#241d3d" stroke="#8b7bd8"/>
  <text x="130" y="340" text-anchor="middle" fill="#9d8bd6" font-size="10.5" font-family="monospace">user_id</text>
  <text x="130" y="358" text-anchor="middle" fill="#e9e4ff" font-size="11">"emre"</text>
  <text x="130" y="380" text-anchor="middle" fill="#7e6fb0" font-size="9.5">the hard boundary</text>

  <rect x="220" y="316" width="200" height="80" rx="8" fill="#241d3d" stroke="#8b7bd8"/>
  <text x="320" y="340" text-anchor="middle" fill="#9d8bd6" font-size="10.5" font-family="monospace">session_id · project_id</text>
  <text x="320" y="358" text-anchor="middle" fill="#e9e4ff" font-size="11">the scope tag</text>
  <text x="320" y="380" text-anchor="middle" fill="#7e6fb0" font-size="9.5">"*" means "everywhere"</text>

  <rect x="435" y="316" width="200" height="80" rx="8" fill="#241d3d" stroke="#8b7bd8"/>
  <text x="535" y="340" text-anchor="middle" fill="#9d8bd6" font-size="10.5" font-family="monospace">value + embedding</text>
  <text x="535" y="358" text-anchor="middle" fill="#e9e4ff" font-size="11">the chunk text + its vector</text>
  <text x="535" y="380" text-anchor="middle" fill="#7e6fb0" font-size="9.5">what search compares against</text>

  <rect x="650" y="316" width="257" height="80" rx="8" fill="#241d3d" stroke="#8b7bd8"/>
  <text x="778" y="340" text-anchor="middle" fill="#9d8bd6" font-size="10.5" font-family="monospace">metadata.source_file</text>
  <text x="778" y="358" text-anchor="middle" fill="#e9e4ff" font-size="11">"handbook.md"</text>
  <text x="778" y="380" text-anchor="middle" fill="#7e6fb0" font-size="9.5">powers the document inventory</text>
</svg>
