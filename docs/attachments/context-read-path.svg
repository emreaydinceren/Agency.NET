  <rect x="0" y="0" width="960" height="440" rx="16" fill="#1b1530"/>
  <text x="480" y="38" text-anchor="middle" fill="#e9e4ff" font-size="24" font-weight="600" letter-spacing="2">The Read Path — Context Into Prompt</text>
  <text x="480" y="56" text-anchor="middle" fill="#9d8bd6" font-size="12" letter-spacing="1">SystemPromptBuilder.Build(ctx)  ·  pure · read-only · Agent.cs:580  ·  runs every iteration</text>

  <!-- ── CTX subgraph (left): x=14 y=68 w=268 h=308 ── -->
  <rect x="14" y="68" width="268" height="310" rx="12" fill="#1a1335" stroke="#a78bfa" stroke-width="1.6"/>
