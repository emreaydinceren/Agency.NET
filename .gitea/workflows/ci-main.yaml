name: CI (Main)

on:
  push:
    branches: [main]

jobs:
  build-and-publish:
    runs-on: dotnet-10
    container:
      image: mcr.microsoft.com/dotnet/sdk:10.0
    defaults:
      run:
        shell: bash

    env:
      LlmTest__Claude__ApiKey: ${{ secrets.LlmTest__Claude__ApiKey }}
      LlmTest__OpenAI__ApiKey: ${{ secrets.LlmTest__OpenAI__ApiKey }}
      ConnectionStrings__PostgreSql: ${{ secrets.ConnectionStrings__PostgreSql }}

    steps:
      - name: 📥 Checkout
        env:
          GIT_TOKEN: ${{ github.token }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          AUTH_URL="${GITHUB_SERVER_URL/http:\/\//http:\/\/x-access-token:$GIT_TOKEN@}"
          BRANCH="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          git clone --depth=1 --branch "$BRANCH" "$AUTH_URL/$GITHUB_REPOSITORY.git" "$GITHUB_WORKSPACE"
          git -C "$GITHUB_WORKSPACE" -c advice.detachedHead=false checkout "$GITHUB_SHA"

      - name: 📦 Restore dependencies
        working-directory: src
        run: dotnet restore

      - name: 🛠️ Build Solution
        working-directory: src
        run: dotnet build --configuration Release --no-restore /p:BuildNumber=${{ github.run_number }}

      - name: 🧪 Run Unit Tests
        working-directory: src
        run: dotnet test --configuration Release --no-build --verbosity normal --filter "Category!=Functional&Category!=Eval"

      - name: 🧪 Run Functional Tests
        working-directory: src
        run: dotnet test --configuration Release --no-build --verbosity normal --filter "Category=Functional"

      - name: 🔎 Read package revision
        id: version
        run: |
          REVISION=$(grep '<Revision>' src/Directory.Build.props | grep -o '[0-9]*')
          echo "revision=$REVISION" >> $GITHUB_OUTPUT

      - name: 📋 Generate third-party notices
        if: steps.version.outputs.revision == '0'
        working-directory: src
        run: |
          # Agency packages embed localhost:3000 as repository URL; forward to actual Gitea host
          # so thirdlicense can fetch license data (patching plain-text files doesn't help because
          # thirdlicense reads the URL from inside the .nupkg zip archive).
          apt-get update -qq && apt-get install -y -q socat
          socat TCP-LISTEN:3000,fork,reuseaddr TCP:gitea-host.example:3000 &
          SOCAT_PID=$!
          dotnet tool install --global thirdlicense || dotnet tool update --global thirdlicense
          export PATH="$HOME/.dotnet/tools:$PATH"
          dotnet sln Agency.slnx list | grep '\.csproj$' | grep -v 'Test' | while read proj; do
            thirdlicense --project "$proj" --output "$(dirname $proj)/THIRD-PARTY-NOTICES.TXT"
          done
          kill $SOCAT_PID 2>/dev/null || true

      - name: 📦 Pack NuGet packages
        if: steps.version.outputs.revision == '0'
        working-directory: src
        run: dotnet pack --configuration Release --no-build /p:BuildNumber=${{ github.run_number }} --output ./nupkg

      - name: 🚀 Publish NuGet packages
        if: steps.version.outputs.revision == '0'
        working-directory: src
        run: |
          for pkg in nupkg/*.nupkg nupkg/*.snupkg; do
            [ -f "$pkg" ] || continue
            curl --fail -X PUT \
              -H "Authorization: token ${{ secrets.NUGETPUBLISHTOKEN }}" \
              -F "package=@$pkg" \
              "http://gitea-host.example:3000/api/packages/emre/nuget"
          done
